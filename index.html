<!DOCTYPE html>
 <html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>妙麗年齡計算機</title>

    <link rel="stylesheet" href="style.css">

  <!--  放入這三行開始 -->
<link rel="icon" type="image/png" href="./icon.png">
<link rel="apple-touch-icon" href="./icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
<!--  放入這三行結束 -->
</head>

<body>

<div class="container">
    <div class="icon-header">🐶</div>
    <h1>妙麗年齡計算機</h1>

    <div class="input-group">
        <label for="birthDate">請選擇妙麗出生日期：</label>
        <input type="date" id="birthDate" required>
    </div>

    <button id="calculateBtn">立即計算</button>

    <div class="result-area" id="resultArea">
        <div class="result-item">
            <span class="result-label">妙麗實際年齡：</span>
            <span class="result-value" id="actualAgeText">--</span>
        </div>
        <div class="result-item">
            <span class="result-label">相當於人類年齡：</span>
            <span class="result-value" id="humanAgeText">--</span>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
